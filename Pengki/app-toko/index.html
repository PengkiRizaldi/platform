<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Inventori Modern</title>
    <!-- Memanggil Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }
    </style>
</head>

<body class="antialiased text-gray-800 min-h-screen p-4 sm:p-8">

    <div class="max-w-6xl mx-auto">
        <!-- Header Section -->
        <header
            class="flex flex-col md:flex-row justify-between items-center bg-white rounded-2xl shadow-sm p-6 mb-8 border border-gray-100">
            <div>
                <h1
                    class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-600">
                    Sistem Inventori
                </h1>
                <p class="text-sm text-gray-500 mt-1">Kelola data barang Anda dengan mudah dan cepat.</p>
            </div>
            <div class="mt-4 md:mt-0">
                <button
                    class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 px-6 rounded-xl shadow-lg shadow-indigo-200 transition-all duration-300 ease-in-out transform hover:-translate-y-0.5 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd"
                            d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z"
                            clip-rule="evenodd" />
                    </svg>
                    Tambah Barang
                </button>
            </div>
        </header>

        <!-- Form Tambah Barang -->
        <div class="bg-white p-5 shadow-sm border border-gray-200 rounded-xl mb-8">
            <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" class="text-amber-500">
                    <path d="M5 12h14" />
                    <path d="M12 5v14" />
                </svg>
                Tambah Barang Baru
            </h2>

            <form id="form-tambah" class="flex flex-col md:flex-row gap-4">
                <div class="flex-1">
                    <label class="block text-xs text-gray-500 font-bold uppercase mb-1">Nama Barang</label>
                    <input type="text" id="input-nama"
                        class="w-full border border-gray-300 p-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500"
                        placeholder="Misal: Mouse Wireless" required>
                </div>
                <div class="flex-1">
                    <label class="block text-xs text-gray-500 font-bold uppercase mb-1">Harga (Rp)</label>
                    <input type="number" id="input-harga"
                        class="w-full border border-gray-300 p-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500"
                        placeholder="Misal: 150000" required>
                </div>
                <div class="flex flex-col justify-end">
                    <button type="submit"
                        class="bg-amber-500 hover:bg-amber-600 text-white font-bold py-2 px-6 rounded-lg transition-colors h-[42px]">
                        Simpan
                    </button>
                </div>
            </form>
        </div>
        <!-- Table Section -->
        <div class="bg-white rounded-3xl shadow-xl shadow-gray-200/50 overflow-hidden border border-gray-100">
            <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                <h2 class="text-xl font-bold text-gray-800">Daftar Barang</h2>
                <div class="relative">
                    <input type="text" placeholder="Cari barang..."
                        class="pl-10 pr-4 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all w-64 bg-white">
                    <svg class="w-4 h-4 text-gray-400 absolute left-3 top-3" fill="none" stroke="currentColor"
                        viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full whitespace-nowrap">
                    <thead>
                        <tr class="bg-gray-50 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">
                            <th class="px-6 py-4 rounded-tl-lg">ID</th>
                            <th class="px-6 py-4">Nama Barang</th>
                            <th class="px-6 py-4 rounded-tr-lg">Harga</th>
                            <th class="px-6 py-4 text-center">Aksi</th>
                        </tr>
                    </thead>
                    <!-- Area ini sengaja dibiarkan KOSONG. JS yang akan mengisinya -->
                    <tbody id="tabel-barang" class="divide-y divide-gray-100 bg-white">
                    </tbody>
                </table>
            </div>
        </div>
    </div>



    <!-- Memanggil file logika JS -->
    <script src="app.js"></script>
</body>

</html>
